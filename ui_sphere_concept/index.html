<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Sphere Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030303;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: #ffffff;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Glassmorphism Classes */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        /* Center Modal Content */
        .modal-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Let clicks pass through to canvas if needed */
        }

        .glass-panel {
            padding: 50px 60px;
            border-radius: 24px;
            text-align: center;
            min-width: 320px;
            pointer-events: auto;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .glass-panel h1 {
            margin: 0 0 15px 0;
            font-size: 36px;
            font-weight: 600;
            letter-spacing: 1px;
            /* Premium gradient text */
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-panel p {
            margin: 0;
            font-size: 16px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }

        /* Bottom Search/Input Bar */
        .bottom-bar {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            gap: 15px;
            width: 90%;
            max-width: 700px;
            padding: 10px;
            border-radius: 40px;
            pointer-events: auto;
        }

        .glass-input {
            flex: 1;
            padding: 16px 28px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .glass-input:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(79, 172, 254, 0.6);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.2);
        }

        .glass-btn {
            padding: 16px 36px;
            border-radius: 30px;
            border: 1px solid rgba(79, 172, 254, 0.4);
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.2) 0%, rgba(0, 242, 254, 0.2) 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glass-btn:hover {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.4) 0%, rgba(0, 242, 254, 0.4) 100%);
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.4);
            transform: translateY(-2px);
            border-color: rgba(79, 172, 254, 0.8);
        }

        /* Subtle glowing orb in background */
        .glow-orb {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(79,172,254,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <!-- Background Glow -->
    <div class="glow-orb"></div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- Center Modal -->
    <div class="modal-container">
        <div class="glass-panel glass">
            <h1>System Core</h1>
            <p>Ready for interaction.</p>
        </div>
    </div>

    <!-- Bottom Input -->
    <div class="bottom-bar glass">
        <input type="text" placeholder="Type a command..." class="glass-input" />
        <button class="glass-btn">Execute</button>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Setup Scene, Camera, Renderer
        const scene = new THREE.Scene();
        // Fog to blend particles smoothly into the background
        scene.fog = new THREE.FogExp2(0x030303, 0.15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4.5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // optimize for high DPI
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Particle Sphere Generation
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 4000;
        const posArray = new Float32Array(particlesCount * 3);
        const colorsArray = new Float32Array(particlesCount * 3);

        const color1 = new THREE.Color(0x4facfe); // light blue
        const color2 = new THREE.Color(0x00f2fe); // cyan
        const color3 = new THREE.Color(0xff00ff); // subtle magenta hint

        for(let i = 0; i < particlesCount * 3; i+=3) {
            // Spherical distribution
            const r = 2.5 + (Math.random() * 0.1); // slight variation in radius
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);

            posArray[i] = x;
            posArray[i+1] = y;
            posArray[i+2] = z;

            // Mix colors
            const mix = Math.random();
            let finalColor = color1;
            if(mix > 0.6) finalColor = color2;
            if(mix > 0.9) finalColor = color3;

            colorsArray[i] = finalColor.r;
            colorsArray[i+1] = finalColor.g;
            colorsArray[i+2] = finalColor.b;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

        // Material with additive blending
        const material = new THREE.PointsMaterial({
            size: 0.018,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh);

        // Interactive variables
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            
            // Base continuous rotation
            particlesMesh.rotation.y = elapsedTime * 0.05;
            particlesMesh.rotation.x = elapsedTime * 0.02;
            
            // Smooth mouse follow interaction
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;
            
            // Add mouse rotation offset
            particlesMesh.rotation.y += 0.05 * (targetX - particlesMesh.rotation.y);
            particlesMesh.rotation.x += 0.05 * (targetY - particlesMesh.rotation.x);

            // Subtle pulsing effect via scale
            const scale = 1 + Math.sin(elapsedTime * 2) * 0.02;
            particlesMesh.scale.set(scale, scale, scale);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
